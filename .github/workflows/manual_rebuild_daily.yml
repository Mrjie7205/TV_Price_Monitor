name: Manual Rebuild Daily Columns (TEMP - delete after testing)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN: only print plan, do NOT update Feishu"
        type: boolean
        default: true
      target:
        description: "Target table"
        type: choice
        options:
          - test
          - production
        default: test

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch (has rebuild_daily_columns.py)
        uses: actions/checkout@v4
        with:
          ref: claude/understand-project-logic-IHdRS

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install requests

      - name: Run Rebuild Script
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID: ${{ inputs.target == 'test' && 'tblHdETxxA0aEdCJ' || secrets.FEISHU_TABLE_ID }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: python rebuild_daily_columns.py
