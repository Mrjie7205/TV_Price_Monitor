name: Weekly Price Archive

on:
  schedule:
    - cron: "15 4 * * 1"   # 每周一 UTC 04:15 (比 daily monitor 的 05:15 早 1 小时)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN: print plan only, do NOT write or delete"
        type: boolean
        default: false
      backfill:
        description: "BACKFILL: archive ALL historical weeks (one-time use)"
        type: boolean
        default: false

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Archive Script
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
          DRY_RUN: ${{ inputs.dry_run }}
          BACKFILL: ${{ inputs.backfill }}
        run: python archive_feishu.py
