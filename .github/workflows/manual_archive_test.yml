name: Manual Archive Test (TEMP - delete after testing)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN: only print plan, do NOT write or delete anything"
        type: boolean
        default: true

jobs:
  archive-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch (has archive_feishu.py)
        uses: actions/checkout@v4
        with:
          ref: claude/understand-project-logic-IHdRS

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Archive Script against TEST table
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID: tbl28CxOZgpiTUd4
          DRY_RUN: ${{ inputs.dry_run }}
        run: python archive_feishu.py
